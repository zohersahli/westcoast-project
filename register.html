<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - Westcoast Education</title>
  <link rel="stylesheet" href="styles/style.css" />
</head>
<body>
  <!-- Navigation -->
  <div class="nav-container">
    <nav>
      <a href="index.html" class="nav-brand">
        Westcoast Education
      </a>
      
      <button id="navToggle" aria-label="Toggle navigation" aria-expanded="false">
        ☰
      </button>

      <div id="navLinks">
        <a href="index.html">Home</a>
      </div>

      <span id="userLinks"></span>
    </nav>
  </div>

  <!-- Registration Form -->
  <main>
    <h1>Register</h1>
    <form id="register-form" class="auth-form-container">
      <label for="firstName">First Name:</label>
      <input type="text" id="firstName" placeholder="First Name" required />

      <label for="lastName">Last Name:</label>
      <input type="text" id="lastName" placeholder="Last Name" required />

      <label for="email">Email:</label>
      <input type="email" id="email" placeholder="Email" required />

      <label for="password">Password:</label>
      <input type="password" id="password" placeholder="Password" required />

      <label for="phone">Phone:</label>
      <input type="text" id="phone" placeholder="Phone" required />

      <label for="address">Address:</label>
      <input type="text" id="address" placeholder="Address" required />

      <button type="submit">Register</button>

      <p id="register-message" style="color:red;"></p>
      <p>Already have an account? <a href="login.html">Login here</a></p>
    </form>
  </main>

  <!-- Import navigation script -->
  <script type="module" src="scripts/navigation.js"></script>
  <!-- Import register script -->
  <script type="module" src="scripts/register.js"></script>

  <!-- Navbar Script -->
  <script>
    const user = JSON.parse(localStorage.getItem('loggedInUser'));
    const userLinks = document.getElementById('userLinks');

    if (user) {
      let links = `
        <a href="my-bookings.html">My Bookings</a>
        <button id="logoutBtn">Logout</button>
      `;
      if (user.email === "admin@example.com") {
        links += `<a href="admin.html">Admin Panel</a>`;
      }
      userLinks.innerHTML = links;

      document.getElementById("logoutBtn").addEventListener("click", () => {
        localStorage.removeItem("loggedInUser");
        window.location.href = "login.html";
      });
    } else {
      userLinks.innerHTML = `
        <a href="login.html">Login</a>
        <a href="register.html">Register</a>
      `;
    }
  </script>

</body>
</html>
